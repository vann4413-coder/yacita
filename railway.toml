[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter './packages/**' build && cd apps/api && npx tsc -p tsconfig.json --skipLibCheck"

[deploy]
startCommand = "node apps/api/dist/server.js"
restartPolicyType = "on_failure"
healthcheckPath = "/health"
healthcheckTimeout = 30
